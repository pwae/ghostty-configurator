<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghostty Configurator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <h1>Ghostty Configurator</h1>
    </div>
    <div class="header-right">
      <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark mode">&#9790;</button>
      <button id="save-btn" class="btn btn-primary">Save</button>
    </div>
  </header>
  <div class="app-layout">
    <nav class="sidebar" id="sidebar">
      <ul class="nav-list">
        <li><button class="nav-item active" data-category="font">Font</button></li>
        <li><button class="nav-item" data-category="colors">Colors &amp; Theme</button></li>
        <li><button class="nav-item" data-category="cursor">Cursor</button></li>
        <li><button class="nav-item" data-category="window">Window</button></li>
        <li><button class="nav-item" data-category="mouse">Mouse &amp; Input</button></li>
        <li><button class="nav-item" data-category="scrollback">Scrollback</button></li>
        <li><button class="nav-item" data-category="advanced">Advanced</button></li>
        <li class="nav-divider"></li>
        <li><button class="nav-item" data-category="all">All Settings</button></li>
      </ul>
    </nav>
    <main class="content" id="content">
    </main>
  </div>
  <div id="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
